<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doar+ - Entrar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:wght@400;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="estilo.css">
</head>
<body class="body-login">
    <!-- Header simplificado -->
    <header class="header-login">
        <div class="container-header-login">
            <a href="index.html" class="logo-area">
                <img src="foto.png" alt="Logo Doar+" class="minha-logo">
                <span class="logo-text">Doar+</span>
            </a>
            <a href="index.html" class="btn-voltar-inicio">
                <i class="fas fa-arrow-left"></i> Voltar para Início
            </a>
        </div>
    </header>

    <main class="login-main">
        <div class="login-container-simples">
            <div class="login-header">
                <h2>Bem-vindo de volta!</h2>
                <p>Faça login para continuar</p>
            </div>

            <form class="login-form-simples">
                <!-- E-mail -->
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        E-mail
                    </label>
                    <input type="email" id="email" placeholder="Digite seu e-mail" required>
                </div>

                <!-- Senha -->
                <div class="form-group">
                    <label for="senha">
                        <i class="fas fa-lock"></i>
                        Senha
                    </label>
                    <input type="password" id="senha" placeholder="Digite sua senha" required>
                </div>

                <!-- Lembrar-me e Esqueci senha -->
                <div class="login-opcoes">
                    <label class="checkbox-container">
                        <input type="checkbox"> 
                        <span>Lembrar-me</span>
                    </label>
                    <a href="#" class="esqueci-senha">Esqueci minha senha</a>
                </div>

                <!-- Botão de Login -->
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i>
                    Entrar
                </button>

                <!-- Link para cadastro -->
                <div class="cadastro-link">
                    <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se gratuitamente</a></p>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer simplificado -->
    <footer class="footer-login">
        <div class="container-footer-login">
            <p>&copy; 2026 Doar+ - Transforme Vidas através da doação</p>
        </div>
    </footer>
</body>
</html>
