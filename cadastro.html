<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doar+ | Criar Conta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:wght@400;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/componentes.css">
    <link rel="stylesheet" href="css/formularios.css">
    <link rel="stylesheet" href="css/paginas.css">
    <link rel="stylesheet" href="css/responsivo.css">
</head>
<body class="body-login">
    <header class="header-login">
        <div class="container-header-login">
            <a href="index.html" class="logo-area">
                <img src="imagens/logoDoar.png" alt="Logo Doar+" class="minha-logo">
            </a>
            <a href="index.html" class="btn-voltar-inicio">
                <i class="fas fa-arrow-left"></i> Voltar para Início
            </a>
        </div>
    </header>

    <main class="login-main">
        <div class="login-container">
            <div class="login-header">
                <h2>Crie sua conta</h2>
                <p>Faça parte dessa corrente do bem</p>
            </div>

            <!-- ID: formCadastro (usado para o evento de submit) -->
            <form class="login-form" id="formCadastro">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="nome"><i class="fas fa-user"></i> Nome Completo</label>
                        <input type="text" id="nome" placeholder="Digite seu nome completo" required>
                    </div>

                    <div class="form-group">
                        <label for="cpf"><i class="fas fa-id-card"></i> CPF</label>
                        <!-- ID: cpf (usado na máscara e na validação matemática) -->
                        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
                    </div>

                    <div class="form-group">
                        <label for="nascimento"><i class="fas fa-calendar-alt"></i> Data de Nascimento</label>
                        <input type="date" id="nascimento" required>
                    </div>

                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> E-mail</label>
                        <input type="email" id="email" placeholder="seu@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="telefone"><i class="fas fa-phone"></i> Telefone</label>
                        <input type="tel" id="telefone" placeholder="(11) 99999-9999" required>
                    </div>

                    <div class="form-group full-width">
                        <label><i class="fas fa-map-marker-alt"></i> Endereço</label>
                    </div>

                    <div class="form-group full-width">
                        <div style="display: flex; gap: 10px; align-items: flex-end;">
                            <div style="flex: 2;">
                                <label for="cep" style="margin-bottom: 5px;"><i class="fas fa-search-location"></i> CEP</label>
                                <!-- ID: cep (usado para buscar na API ViaCEP) -->
                                <input type="text" id="cep" placeholder="00000-000" maxlength="9">
                            </div>
                            <div style="flex: 1;">
                                <!-- ID: btnBuscarCep -->
                                <button type="button" id="btnBuscarCep" class="btn-buscar-cep">
                                    <i class="fas fa-search"></i> Buscar
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- IDs: rua, numero, bairro, cidade, uf (preenchidos automaticamente pelo cep.js) -->
                    <div class="form-group full-width">
                        <input type="text" id="rua" placeholder="Rua / Avenida" required>
                    </div>

                    <div class="form-group">
                        <input type="text" id="numero" placeholder="Número" required>
                    </div>

                    <div class="form-group">
                        <input type="text" id="bairro" placeholder="Bairro" required>
                    </div>

                    <div class="form-group full-width">
                        <input type="text" id="complemento" placeholder="Complemento (opcional)">
                    </div>

                    <div class="form-group">
                        <input type="text" id="cidade" placeholder="Cidade" required>
                    </div>

                    <div class="form-group">
                        <select id="uf" required>
                            <option value="">UF</option>
                            <option value="AC">AC</option> <option value="AL">AL</option>
                            <option value="AP">AP</option> <option value="AM">AM</option>
                            <option value="BA">BA</option> <option value="CE">CE</option>
                            <option value="DF">DF</option> <option value="ES">ES</option>
                            <option value="GO">GO</option> <option value="MA">MA</option>
                            <option value="MT">MT</option> <option value="MS">MS</option>
                            <option value="MG">MG</option> <option value="PA">PA</option>
                            <option value="PB">PB</option> <option value="PR">PR</option>
                            <option value="PE">PE</option> <option value="PI">PI</option>
                            <option value="RJ">RJ</option> <option value="RN">RN</option>
                            <option value="RS">RS</option> <option value="RO">RO</option>
                            <option value="RR">RR</option> <option value="SC">SC</option>
                            <option value="SP">SP</option> <option value="SE">SE</option>
                            <option value="TO">TO</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="senha"><i class="fas fa-lock"></i> Senha</label>
                        <!-- ID: senha -->
                        <input type="password" id="senha" placeholder="Crie uma senha" required>
                    </div>

                    <div class="form-group">
                        <label for="confirmar-senha"><i class="fas fa-lock"></i> Confirmar Senha</label>
                        <!-- ID: confirmar-senha -->
                        <input type="password" id="confirmar-senha" placeholder="Confirme sua senha" required>
                    </div>
                </div>

                <div class="termos-group">
                    <input type="checkbox" id="termos" required>
                    <label for="termos">Li e aceito os <a href="#">Termos de Uso</a></label>
                </div>

                <button type="submit" class="btn-cadastro">
                    <i class="fas fa-hand-holding-heart"></i> Criar minha conta
                </button>
            </form>
        </div>
    </main>

    <footer class="footer-login">
        <div class="container-footer-login">
            <p>&copy; 2026 Doar+ Transforme Vidas através da doação</p>
        </div>
    </footer>

    <!-- Scripts carregados ao final para garantir que os IDs existam no DOM -->
    <script src="JS/cep.js"></script>
    <script src="JS/validacoes.js"></script>
</body>
</html>
