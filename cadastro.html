<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doar+ | Criar Conta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:wght@400;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="estilo.css">
</head>
<body class="body-login">
    <!-- Header simplificado -->
    <header class="header-login">
        <div class="container-header-login">
            <a href="index.html" class="logo-area">
                <img src="imagens/logoDoar.png" alt="Logo Doar+" class="minha-logo">
            </a>
            <a href="index.html" class="btn-voltar-inicio">
                <i class="fas fa-arrow-left"></i> Voltar para Início
            </a>
        </div>
    </header>

    <main class="login-main">
        <div class="login-container">
            <div class="login-header">
                <h2>Crie sua conta</h2>
                <p>Faça parte dessa corrente do bem</p>
            </div>

            <form class="login-form" id="formCadastro">
                <div class="form-grid">
                    <!-- Nome Completo -->
                    <div class="form-group full-width">
                        <label for="nome">
                            <i class="fas fa-user"></i>
                            Nome Completo
                        </label>
                        <input type="text" id="nome" placeholder="Digite seu nome completo" required>
                    </div>

                    <!-- CPF e Data de Nascimento -->
                    <div class="form-group">
                        <label for="cpf">
                            <i class="fas fa-id-card"></i>
                            CPF
                        </label>
                        <input type="text" id="cpf" placeholder="000.000.000-00" required>
                    </div>

                    <div class="form-group">
                        <label for="nascimento">
                            <i class="fas fa-calendar-alt"></i>
                            Data de Nascimento
                        </label>
                        <input type="date" id="nascimento" required>
                    </div>

                    <!-- Email e Telefone -->
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i>
                            E-mail
                        </label>
                        <input type="email" id="email" placeholder="seu@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="telefone">
                            <i class="fas fa-phone"></i>
                            Telefone
                        </label>
                        <input type="tel" id="telefone" placeholder="(11) 99999-9999" required>
                    </div>

                    <!-- ENDEREÇO COMPLETO SEPARADO COM CEP -->
                    <div class="form-group full-width">
                        <label>
                            <i class="fas fa-map-marker-alt"></i>
                            Endereço
                        </label>
                    </div>

                    <!-- CEP com busca automática -->
                    <div class="form-group full-width">
                        <div style="display: flex; gap: 10px; align-items: flex-end;">
                            <div style="flex: 2;">
                                <label for="cep" style="margin-bottom: 5px;">
                                    <i class="fas fa-search-location"></i>
                                    CEP
                                </label>
                                <input type="text" id="cep" placeholder="00000-000" maxlength="9" style="flex: 1;">
                            </div>
                            <div style="flex: 1;">
                                <button type="button" id="btnBuscarCep" class="btn-buscar-cep">
                                    <i class="fas fa-search"></i> Buscar
                                </button>
                            </div>
                        </div>
                        <small style="color: #666; display: block; margin-top: 5px;">
                            <i class="fas fa-info-circle"></i> Digite o CEP e clique em Buscar para preencher automaticamente
                        </small>
                    </div>

                    <!-- Rua -->
                    <div class="form-group full-width">
                        <input type="text" id="rua" placeholder="Rua / Avenida" required>
                    </div>

                    <!-- Número e Bairro -->
                    <div class="form-group">
                        <input type="text" id="numero" placeholder="Número" required>
                    </div>

                    <div class="form-group">
                        <input type="text" id="bairro" placeholder="Bairro" required>
                    </div>

                    <!-- Complemento -->
                    <div class="form-group full-width">
                        <input type="text" id="complemento" placeholder="Complemento (opcional)">
                    </div>

                    <!-- Cidade e UF -->
                    <div class="form-group">
                        <input type="text" id="cidade" placeholder="Cidade" required>
                    </div>

                    <div class="form-group">
                        <select id="uf" required>
                            <option value="">UF</option>
                            <option value="AC">AC</option>
                            <option value="AL">AL</option>
                            <option value="AP">AP</option>
                            <option value="AM">AM</option>
                            <option value="BA">BA</option>
                            <option value="CE">CE</option>
                            <option value="DF">DF</option>
                            <option value="ES">ES</option>
                            <option value="GO">GO</option>
                            <option value="MA">MA</option>
                            <option value="MT">MT</option>
                            <option value="MS">MS</option>
                            <option value="MG">MG</option>
                            <option value="PA">PA</option>
                            <option value="PB">PB</option>
                            <option value="PR">PR</option>
                            <option value="PE">PE</option>
                            <option value="PI">PI</option>
                            <option value="RJ">RJ</option>
                            <option value="RN">RN</option>
                            <option value="RS">RS</option>
                            <option value="RO">RO</option>
                            <option value="RR">RR</option>
                            <option value="SC">SC</option>
                            <option value="SP">SP</option>
                            <option value="SE">SE</option>
                            <option value="TO">TO</option>
                        </select>
                    </div>

                    <!-- Senha e Confirmar Senha -->
                    <div class="form-group">
                        <label for="senha">
                            <i class="fas fa-lock"></i>
                            Senha
                        </label>
                        <input type="password" id="senha" placeholder="Crie uma senha" required>
                    </div>

                    <div class="form-group">
                        <label for="confirmar-senha">
                            <i class="fas fa-lock"></i>
                            Confirmar Senha
                        </label>
                        <input type="password" id="confirmar-senha" placeholder="Confirme sua senha" required>
                    </div>
                </div>

                <!-- Termos e Condições -->
                <div class="termos-group">
                    <input type="checkbox" id="termos" required>
                    <label for="termos">
                        Li e aceito os <a href="#">Termos de Uso</a> e a <a href="#">Política de Privacidade</a>
                    </label>
                </div>

                <!-- Botão de Cadastro -->
                <button type="submit" class="btn-cadastro">
                    <i class="fas fa-hand-holding-heart"></i>
                    Criar minha conta
                </button>

                <!-- Link para login -->
                <div class="login-options">
                    <p>Já tem uma conta? <a href="login.html">Faça login</a></p>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer simplificado -->
    <footer class="footer-login">
        <div class="container-footer-login">
            <p>&copy; 2026 Doar+ Transforme Vidas através da doação</p>
        </div>
    </footer>

    <script>
        // Formatação automática do CEP
        const cepInput = document.getElementById('cep');
        
        cepInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 5) {
                value = value.slice(0, 5) + '-' + value.slice(5, 8);
            }
            e.target.value = value;
        });

        // Função para buscar CEP na API ViaCEP
        async function buscarCep() {
            const cep = document.getElementById('cep').value.replace(/\D/g, '');
            const btnBuscar = document.getElementById('btnBuscarCep');
            
            if (cep.length !== 8) {
                alert('Por favor, digite um CEP válido com 8 números');
                return;
            }

            // Mostrar loading no botão
            const originalText = btnBuscar.innerHTML;
            btnBuscar.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Buscando...';
            btnBuscar.disabled = true;

            try {
                // Chamada para a API ViaCEP
                const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const data = await response.json();

                if (data.erro) {
                    alert('CEP não encontrado. Verifique o número digitado.');
                    return;
                }

                // Preencher os campos com os dados retornados
                document.getElementById('rua').value = data.logradouro || '';
                document.getElementById('bairro').value = data.bairro || '';
                document.getElementById('cidade').value = data.localidade || '';
                document.getElementById('uf').value = data.uf || '';
                
                // Se tiver complemento, preencher
                if (data.complemento) {
                    document.getElementById('complemento').value = data.complemento;
                }

                // Foco automático no campo número após buscar
                document.getElementById('numero').focus();
                
                // Pequeno feedback visual
                Object.assign(document.getElementById('rua').style, { 
                    borderColor: '#4caf50', 
                    transition: '0.3s' 
                });
                setTimeout(() => {
                    document.getElementById('rua').style.borderColor = '#e0e0e0';
                }, 2000);

            } catch (error) {
                console.error('Erro ao buscar CEP:', error);
                alert('Erro ao buscar CEP. Verifique sua conexão com a internet.');
            } finally {
                // Restaurar botão
                btnBuscar.innerHTML = originalText;
                btnBuscar.disabled = false;
            }
        }

        // Buscar automaticamente ao pressionar Enter no campo CEP
        cepInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                buscarCep();
            }
        });

        // Evento do botão de buscar
        document.getElementById('btnBuscarCep').addEventListener('click', buscarCep);

        // Validação de senha no submit
        document.getElementById('formCadastro').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const senha = document.getElementById('senha').value;
            const confirmarSenha = document.getElementById('confirmar-senha').value;
            
            if (senha !== confirmarSenha) {
                alert('As senhas não coincidem!');
                return;
            }
            
            if (senha.length < 6) {
                alert('A senha deve ter no mínimo 6 caracteres');
                return;
            }
            
            // Se chegou aqui, todos os campos estão OK
            alert('Cadastro realizado com sucesso!\nBem-vindo ao Doar+');
            // Aqui você pode redirecionar para a página de login
            // window.location.href = 'login.html';
        });

        // Máscara para CPF
        const cpfInput = document.getElementById('cpf');
        cpfInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            
            if (value.length > 9) {
                value = value.slice(0, 3) + '.' + value.slice(3, 6) + '.' + value.slice(6, 9) + '-' + value.slice(9, 11);
            } else if (value.length > 6) {
                value = value.slice(0, 3) + '.' + value.slice(3, 6) + '.' + value.slice(6, 9);
            } else if (value.length > 3) {
                value = value.slice(0, 3) + '.' + value.slice(3, 6);
            }
            e.target.value = value;
        });

        // Máscara para Telefone
        const telefoneInput = document.getElementById('telefone');
        telefoneInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            
            if (value.length > 10) {
                value = '(' + value.slice(0, 2) + ') ' + value.slice(2, 7) + '-' + value.slice(7, 11);
            } else if (value.length > 6) {
                value = '(' + value.slice(0, 2) + ') ' + value.slice(2, 6) + '-' + value.slice(6, 10);
            } else if (value.length > 2) {
                value = '(' + value.slice(0, 2) + ') ' + value.slice(2, 6);
            } else if (value.length > 0) {
                value = '(' + value;
            }
            e.target.value = value;
        });
    </script>
</body>
</html>
